name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: npm audit (high)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: keyfount-server:ci
          load: true
      # Library scan — fails the build on any HIGH/CRITICAL in our app
      # dependencies (lockfile we control). Refresh lockfile to fix.
      - name: Trivy scan (app libs)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: keyfount-server:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: library

      # OS scan — informational only. Base image is distroless/Debian which
      # we can't patch ourselves; we rely on upstream rebuilds.
      - name: Trivy scan (OS, informational)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: keyfount-server:ci
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os

  # Pushing to `develop` publishes a rolling pre-release image tagged `beta`,
  # so self-hosters can track the next release. Versioned + `latest` images
  # are cut from the develop -> main release PR (release.yml).
  beta-image:
    name: Build & push beta image
    needs: [build, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=beta
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Keyfount Server
            org.opencontainers.image.description=Self-hostable, zero-knowledge sync server for the Keyfount deterministic password manager.
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
