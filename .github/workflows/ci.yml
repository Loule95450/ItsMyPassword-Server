name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: npm audit (high)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: keyfount-server:ci
          load: true
      # Library scan — fails the build on any HIGH/CRITICAL in our app
      # dependencies (lockfile we control). Refresh lockfile to fix.
      - name: Trivy scan (app libs)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: keyfount-server:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: library

      # OS scan — informational only. Base image is distroless/Debian which
      # we can't patch ourselves; we rely on upstream rebuilds.
      - name: Trivy scan (OS, informational)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: keyfount-server:ci
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os
