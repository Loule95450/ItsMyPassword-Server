# Keyfount sync server — drop-in stack for Portainer, Synology
# Container Manager, Unraid, or plain `docker compose up -d`.
#
# Use this file when you already have a reverse proxy in front (Synology
# DSM Reverse Proxy, Traefik, nginx, Cloudflare Tunnel…). For a standalone
# stack with automatic TLS via Caddy + Let's Encrypt, see
# docker-compose.standalone.yml.

services:
  app:
    image: ghcr.io/keyfount/server:latest
    container_name: keyfount
    restart: unless-stopped
    # Public API port. Safe to expose behind your reverse proxy.
    # The admin port (8081 inside the container) is bound to 127.0.0.1
    # on the host so it never leaves your machine without an explicit
    # SSH tunnel or a separate proxy line.
    ports:
      - "${HOST_PORT:-8080}:8080"
      - "127.0.0.1:${ADMIN_HOST_PORT:-8081}:8081"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      ADMIN_PORT: 8081
      ADMIN_HOST: 0.0.0.0
      DATABASE_PATH: /data/keyfount.db
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      SERVER_HMAC_KEY: ${SERVER_HMAC_KEY:?Set SERVER_HMAC_KEY in .env — generate with: openssl rand -base64 32}
    volumes:
      - data:/data
    # Distroless has no shell; we check liveness with a tiny exec via the
    # bundled node binary. Probing the public API port is enough — the
    # admin instance shares its services and would not survive a DB
    # outage either.
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  data:
