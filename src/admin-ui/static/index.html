<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ItsMyPassword — Admin</title>
    <link rel="stylesheet" href="./admin.css" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var dark =
            saved !== null
              ? saved === "dark"
              : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {
          /* localStorage blocked — fall through to light */
        }
        try {
          var loc = localStorage.getItem("impw.admin.locale.v1");
          if (loc === "fr" || loc === "en") document.documentElement.lang = loc;
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body class="font-sans">
    <div id="app"></div>
    <script type="module" src="./admin.js"></script>
  </body>
</html>
